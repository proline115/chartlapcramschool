<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>チャート周回予備校HP</title>

    <link rel="stylesheet" href="style.css">
    <link
    rel="preload"
    href="images/background.jpg"
    as="image">
</head>

<body>

    

<div class="container">

    <div id="openingCover"></div>

    <img src="images/left.png" class="fade left">

    <img src="images/right.png" class="fade right">

    <img src="images/bottom.png" class="fade bottom">

    <img src="images/logo.png" class="opening-logo">

    <div
id="tapStart"
onclick="startSite()">

Tap to Start

</div>

</div>

<header id="banner">

    <div class="banner-left">

        <div class="logo" onclick="navigateTo('home')">
    <img src="images/logo.png" onclick="rotateLogo(event)">
</div>

        <div class="nav-item" onclick="navigateTo('home')">

            <img src="images/home.png">

            <span>ホーム</span>

        </div>


        <div class="nav-item" onclick="navigateTo('mondai')">

            <img src="images/problem.png">

            <span>問題集</span>

        </div>


        <div class="nav-item" onclick="navigateTo('kasu')">

            <img src="images/kasu.png">

            <span>カス問題集</span>

        </div>


        <div class="nav-item" onclick="navigateTo('kokoroe')">

            <img src="images/kokoroe.png">

            <span>心得</span>

        </div>


        <div class="nav-item" onclick="navigateTo('history')">

            <img src="images/history.png">

            <span>歴史</span>

        </div>

    </div>



    <div class="banner-right">

        <div class="nav-item" onclick="navigateTo('password')">

            <img src="images/password.png">

            <span>合言葉</span>

        </div>


        <div class="nav-item" onclick="navigateTo('answer')">

            <img src="images/answer.png">

            <span>答え</span>

        </div>

    </div>

</header>

<main id="content">

    <div id="page-home" class="page active">ホーム</div>

    <div id="page-mondai" class="page">問題集</div>

    <div id="page-kasu" class="page">カス問題集</div>

    <div id="page-kokoroe" class="page">心得</div>

    <div id="page-history" class="page">歴史</div>

    <div id="page-password" class="page">合言葉</div>

    <div id="page-answer" class="page">答え</div>

</main>

<script src="script.js"></script>

</body>
</html>
